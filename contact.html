<!DOCTYPE html>
<html lang="en">
  <!-- Contact page for ConnectSA -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConnectSA | Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="CSS/styles.css" />
  </head>
  <body>
    <!-- Site header and navigation -->
    <header class="site-header">
      <div class="container header-content">
        <a href="index.html" class="brand">ConnectSA</a>
        <nav class="main-nav" aria-label="Primary navigation">
          <a href="index.html" class="nav-link">Home</a>
          <a href="contact.html" class="nav-link active">Contact</a>
        </nav>
      </div>
    </header>

    <main class="container contact-page">
      <!-- Contact page intro -->
      <section class="hero contact-hero">
        <h1>Contact Us</h1>
        <p>Send us a message and we will help connect you to the right service.</p>
      </section>

      <!-- Contact form with client-side validation -->
      <form id="contactForm" novalidate>
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input id="fullName" name="fullName" type="text" placeholder="Enter your full name" />
          <div class="error-message" id="error-fullName"></div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" placeholder="Enter your email" />
          <div class="error-message" id="error-email"></div>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input id="phone" name="phone" type="tel" placeholder="Enter 10-digit phone number" />
          <div class="error-message" id="error-phone"></div>
        </div>

        <div class="form-group">
          <label for="category">Service Category of Enquiry</label>
          <select id="category" name="category">
            <option value="">Select a category</option>
            <option value="Health">Health</option>
            <option value="Education">Education</option>
            <option value="Legal">Legal</option>
            <option value="Youth">Youth</option>
            <option value="Housing">Housing</option>
            <option value="Community">Community</option>
          </select>
          <div class="error-message" id="error-category"></div>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Describe your enquiry"></textarea>
          <div class="error-message" id="error-message"></div>
        </div>

        <button type="submit" class="submit-btn">Submit</button>
        <div id="formSuccess" class="form-success" aria-live="polite"></div>
      </form>
    </main>

    <footer class="site-footer">
      <div class="container footer-content">
        <p>Member 1: Full Name One | Student Number: 20240001</p>
        <p>Member 2: Full Name Two | Student Number: 20240002</p>
        <p>© 2026 ConnectSA. All rights reserved.</p>
      </div>
    </footer>

    <script src="JS/script.js"></script>
  </body>
</html>
